<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entity ID Migration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { font-size: 1.5em; margin-bottom: 4px; }
  .subtitle { color: #888; margin-bottom: 16px; }
  .badges { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .badge { padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; }
  .badge-exact { background: #1a3a1a; color: #4caf50; }
  .badge-fuzzy { background: #3a2a1a; color: #ff9800; }
  .badge-unmatched { background: #3a1a1a; color: #f44336; }
  .badge-confirmed { background: #1a2a3a; color: #2196f3; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 6px; border-bottom: 2px solid #333; color: #999; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: #1a1a2e; }
  td { padding: 6px; border-bottom: 1px solid #2a2a3e; vertical-align: middle; }
  tr:hover { background: #22223a; }
  tr.skip td { opacity: 0.35; }
  tr.fuzzy { background: #2a2210; }
  tr.unmatched { background: #2a1510; }

  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: #888; }
  .arrow { text-align: center; font-size: 16px; }
  .arrow-exact { color: #4caf50; }
  .arrow-fuzzy { color: #ff9800; }
  .arrow-unmatched { color: #f44336; }

  .confidence { font-size: 12px; }
  .conf-exact { color: #4caf50; }
  .conf-fuzzy { color: #ff9800; }
  .conf-unmatched { color: #f44336; }

  .actions { display: flex; gap: 4px; }
  .btn { border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .btn-skip { background: #444; color: #ccc; }
  .btn-skip:hover { background: #555; }
  .btn-confirm { background: #2a5a2a; color: #4caf50; }
  .btn-confirm:hover { background: #3a6a3a; }
  .btn-edit { background: #3a3a1a; color: #ff9800; }
  .btn-edit:hover { background: #4a4a2a; }

  select { background: #2a2a3e; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; font-size: 12px; max-width: 250px; }

  .footer { margin-top: 20px; display: flex; gap: 12px; align-items: center; }
  .btn-commit { background: #4caf50; color: #fff; border: none; padding: 8px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-commit:hover { background: #5cbf60; }
  .btn-commit:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-export { background: #444; color: #ccc; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .btn-export:hover { background: #555; }

  .env-warning { background: #3a2a1a; border: 1px solid #ff9800; border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 13px; color: #ff9800; }

  /* Progress overlay */
  .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .progress-box { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .progress-bar { height: 8px; background: #333; border-radius: 4px; margin: 12px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: #4caf50; border-radius: 4px; transition: width 0.3s; }
  .progress-log { font-size: 12px; font-family: monospace; max-height: 300px; overflow-y: auto; margin-top: 12px; }
  .progress-log div { padding: 2px 0; }
  .progress-log .success { color: #4caf50; }
  .progress-log .fail { color: #f44336; }

  .confirm-dialog { background: #1a1a2e; border: 1px solid #f44336; border-radius: 8px; padding: 24px; max-width: 400px; text-align: center; }
  .confirm-dialog h3 { margin-bottom: 8px; color: #f44336; }
  .confirm-dialog p { margin-bottom: 16px; color: #ccc; }
  .confirm-dialog .btns { display: flex; gap: 12px; justify-content: center; }
  .confirm-dialog .btn-cancel { background: #444; color: #ccc; padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
  .confirm-dialog .btn-go { background: #f44336; color: #fff; padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }

  .distance { color: #666; font-size: 11px; }
</style>
</head>
<body>

<h1 id="title">Entity ID Migration</h1>
<p class="subtitle" id="subtitle">Loading...</p>

<div class="env-warning" id="envWarning" style="display:none">
  WIKI_USERNAME and WIKI_API_KEY are not configured in .env — commit will be disabled.
</div>

<div class="badges" id="badges"></div>

<table>
  <thead>
    <tr>
      <th>Old External ID</th>
      <th>Old Name</th>
      <th></th>
      <th>New External ID</th>
      <th>New Name</th>
      <th>Type</th>
      <th>Confidence</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="footer" id="footer">
  <button class="btn-commit" id="commitBtn" onclick="confirmCommit()">Commit 0 Migrations</button>
  <button class="btn-export" onclick="exportJson()">Export JSON</button>
</div>

<!-- Confirm dialog -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <h3>Confirm Migration</h3>
    <p id="confirmText">Migrate 0 entity IDs? This cannot be undone.</p>
    <div class="btns">
      <button class="btn-cancel" onclick="hideConfirm()">Cancel</button>
      <button class="btn-go" onclick="doCommit()">Migrate</button>
    </div>
  </div>
</div>

<!-- Progress overlay -->
<div class="overlay" id="progressOverlay">
  <div class="progress-box">
    <h3 id="progressTitle">Committing...</h3>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p id="progressStatus">Authenticating...</p>
    <div class="progress-log" id="progressLog"></div>
  </div>
</div>

<script>
let data = null;
let unmatchedNewEntities = [];

function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatDist(meters) {
  if (meters < 1000) return Math.round(meters) + 'm';
  return (meters / 1000).toFixed(1) + 'km';
}

async function load() {
  const resp = await fetch('/api/mappings');
  data = await resp.json();
  unmatchedNewEntities = data.unmatchedNew || [];
  render();
}

function render() {
  document.getElementById('title').textContent = `Entity ID Migration — ${data.parkName}`;
  document.getElementById('subtitle').textContent = `${data.mappings.length} wiki entities`;

  const s = data.summary;
  document.getElementById('badges').innerHTML = `
    <span class="badge badge-exact">${s.exact} exact</span>
    <span class="badge badge-fuzzy">${s.fuzzy} fuzzy</span>
    <span class="badge badge-unmatched">${s.unmatched} unmatched</span>
    <span class="badge badge-confirmed">${s.confirmed} to migrate</span>
  `;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  data.mappings.forEach((m, idx) => {
    const tr = document.createElement('tr');
    tr.className = m.status === 'skip' ? `${m.confidence} skip` : m.confidence;

    const distStr = m.distance !== null ? `<span class="distance">${m.distance}m</span>` : '';

    tr.innerHTML = `
      <td class="mono">${esc(m.oldExternalId)}</td>
      <td>${esc(m.oldName)}</td>
      <td class="arrow arrow-${m.confidence}">${m.newExternalId ? '→' : '—'}</td>
      <td class="mono">${m.newExternalId ? esc(m.newExternalId.substring(0, 12) + '...') : renderPairDropdown(idx, m)}</td>
      <td>${m.newName ? esc(m.newName) : ''} ${distStr}</td>
      <td style="font-size:11px;color:#888">${m.entityType}</td>
      <td class="confidence conf-${m.confidence}">${renderConfidence(m)}</td>
      <td class="actions">${renderActions(idx, m)}</td>
    `;
    tbody.appendChild(tr);
  });

  const confirmed = data.mappings.filter(m => m.status === 'confirmed' && m.newExternalId).length;
  const commitBtn = document.getElementById('commitBtn');
  commitBtn.textContent = `Commit ${confirmed} Migrations`;
  commitBtn.disabled = confirmed === 0;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderConfidence(m) {
  if (m.confidence === 'exact') return '● Exact';
  if (m.confidence === 'fuzzy') return `● Fuzzy (${m.confidenceScore}%)`;
  return '● None';
}

function renderActions(idx, m) {
  if (m.status === 'skip' && m.confidence !== 'unmatched') {
    return `<button class="btn btn-confirm" onclick="confirmMapping(${idx})">↩</button>`;
  }
  let html = '';
  if (m.confidence === 'unmatched' || m.confidence === 'fuzzy') {
    html += `<button class="btn btn-edit" onclick="editMapping(${idx})">✎</button>`;
  }
  if (m.newExternalId) {
    html += `<button class="btn btn-skip" onclick="skipMapping(${idx})">✕</button>`;
  }
  return html;
}

function renderPairDropdown(idx, m) {
  // Show ALL new entities of this type, not just originally unmatched.
  // Mark ones that are currently paired to another mapping.
  const allNew = (data.allNewEntities || unmatchedNewEntities).filter(n => n.entityType === m.entityType);
  if (allNew.length === 0) return '<em style="color:#666">No candidates</em>';

  // Which new IDs are currently claimed by other mappings?
  const claimedByOther = new Set();
  data.mappings.forEach((other, otherIdx) => {
    if (otherIdx !== idx && other.newExternalId && other.status === 'confirmed') {
      claimedByOther.add(other.newExternalId);
    }
  });

  // Compute distance for each candidate and sort by nearest
  const withDist = allNew.map(n => {
    let dist = null;
    if (m.oldLatitude != null && n.latitude != null) {
      dist = haversineMeters(m.oldLatitude, m.oldLongitude, n.latitude, n.longitude);
    }
    return {...n, dist, claimed: claimedByOther.has(n.newId)};
  }).sort((a, b) => {
    // Unclaimed first, then by distance
    if (a.claimed !== b.claimed) return a.claimed ? 1 : -1;
    if (a.dist == null && b.dist == null) return 0;
    if (a.dist == null) return 1;
    if (b.dist == null) return -1;
    return a.dist - b.dist;
  });

  let html = `<select onchange="pairMapping(${idx}, this.value)">`;
  html += `<option value="">Select...</option>`;
  withDist.forEach(n => {
    const distLabel = n.dist != null ? ` [${formatDist(n.dist)}]` : '';
    const claimedLabel = n.claimed ? ' (paired)' : '';
    html += `<option value="${esc(n.newId)}" data-name="${esc(n.name)}">${esc(n.name)}${distLabel}${claimedLabel}</option>`;
  });
  html += '</select>';
  return html;
}

async function skipMapping(idx) {
  await fetch(`/api/mappings/${idx}`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: 'skip'})});
  await load();
}

async function confirmMapping(idx) {
  await fetch(`/api/mappings/${idx}`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: 'confirm'})});
  await load();
}

async function pairMapping(idx, newId) {
  if (!newId) return;
  const entity = unmatchedNewEntities.find(n => n.newId === newId);
  await fetch(`/api/mappings/${idx}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'pair', newExternalId: newId, newName: entity?.name || newId}),
  });
  await load();
}

async function editMapping(idx) {
  const m = data.mappings[idx];
  // Unpair first, then let the dropdown render
  await fetch(`/api/mappings/${idx}`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: 'unpair'})});
  await load();
}

function exportJson() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `migration-${data.parkName.toLowerCase().replace(/\s+/g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function confirmCommit() {
  const count = data.mappings.filter(m => m.status === 'confirmed' && m.newExternalId).length;
  document.getElementById('confirmText').textContent = `Migrate ${count} entity IDs? This cannot be undone.`;
  document.getElementById('confirmOverlay').classList.add('active');
}

function hideConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
}

async function doCommit() {
  hideConfirm();
  document.getElementById('progressOverlay').classList.add('active');
  document.getElementById('progressLog').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';

  // Start SSE listener
  const evtSource = new EventSource('/api/commit/status');
  evtSource.addEventListener('status', (e) => {
    const d = JSON.parse(e.data);
    document.getElementById('progressStatus').textContent = d.message;
  });
  evtSource.addEventListener('progress', (e) => {
    const d = JSON.parse(e.data);
    const pct = (d.index / d.total * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressStatus').textContent = `${d.index}/${d.total}`;
    const log = document.getElementById('progressLog');
    const cls = d.success ? 'success' : 'fail';
    log.innerHTML += `<div class="${cls}">${d.success ? '✓' : '✗'} ${esc(d.name || '')} ${d.oldId || ''} → ${d.newId || ''} ${d.error ? '(' + esc(d.error) + ')' : ''}</div>`;
    log.scrollTop = log.scrollHeight;
  });
  evtSource.addEventListener('complete', (e) => {
    const d = JSON.parse(e.data);
    document.getElementById('progressTitle').textContent = 'Migration Complete';
    document.getElementById('progressStatus').textContent = `${d.succeeded} succeeded, ${d.failed} failed`;
    document.getElementById('progressFill').style.width = '100%';
    if (d.failed > 0) document.getElementById('progressFill').style.background = '#ff9800';
    evtSource.close();
  });
  evtSource.addEventListener('error', (e) => {
    try {
      const d = JSON.parse(e.data);
      document.getElementById('progressTitle').textContent = 'Error';
      document.getElementById('progressStatus').textContent = d.message;
    } catch {}
    evtSource.close();
  });

  // Trigger commit
  await fetch('/api/commit', {method: 'POST'});
}

load();
</script>
</body>
</html>
